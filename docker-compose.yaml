services:
  app:
    build: .
    container_name: myapp
    expose:
      - "8080"
    depends_on:
      - redis
    environment:
      - REDIS_ADDR=redis:6379
      - VIRTUAL_HOST=myapp.example.com
      - VIRTUAL_PORT=8080
    networks:
      - proxy
      - internal

  redis:
    image: redis:alpine
    networks:
      - internal

networks:
  proxy:
    external: true
    name: proxy
  internal:
    driver: bridge